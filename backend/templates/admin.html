<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GenZ Legal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-text {
            background: linear-gradient(to right, #06b6d4, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-purple-950 min-h-screen text-white">
    <header class="border-b border-slate-700/50 backdrop-blur-xl bg-slate-900/50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <i class="fas fa-shield-alt text-3xl text-red-400"></i>
                    <div>
                        <h1 class="text-xl font-bold gradient-text">Admin Dashboard</h1>
                        <p class="text-slate-500 text-xs">Quan tri he thong GenZ Legal AI</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="px-4 py-2 bg-red-500/20 border border-red-500/30 rounded-lg">
                        <i class="fas fa-shield-alt text-red-400 mr-2"></i>
                        <span class="text-red-300 text-sm">Admin Mode</span>
                    </div>
                    <button onclick="window.location.href='/'" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition">
                        Thoat Admin
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-6 hover:border-cyan-500/50 transition">
                <div class="flex items-center justify-between mb-4">
                    <i class="fas fa-users text-3xl text-cyan-400"></i>
                    <span class="text-3xl font-bold" id="total-users">-</span>
                </div>
                <p class="text-slate-400">Tong nguoi dung</p>
            </div>
            <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-6 hover:border-pink-500/50 transition">
                <div class="flex items-center justify-between mb-4">
                    <i class="fas fa-file-alt text-3xl text-pink-400"></i>
                    <span class="text-3xl font-bold" id="total-analyses">-</span>
                </div>
                <p class="text-slate-400">Tong phan tich</p>
            </div>
            <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-6 hover:border-green-500/50 transition">
                <div class="flex items-center justify-between mb-4">
                    <i class="fas fa-user-check text-3xl text-green-400"></i>
                    <span class="text-3xl font-bold" id="active-users">-</span>
                </div>
                <p class="text-slate-400">Nguoi dung hoat dong</p>
            </div>
            <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-6 hover:border-purple-500/50 transition">
                <div class="flex items-center justify-between mb-4">
                    <i class="fas fa-chart-line text-3xl text-purple-400"></i>
                    <span class="text-3xl font-bold">99.2%</span>
                </div>
                <p class="text-slate-400">Uptime</p>
            </div>
        </div>

        <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-8">
            <h2 class="text-2xl font-bold mb-6 text-cyan-300">
                <i class="fas fa-chart-bar mr-2"></i>Thong ke he thong
            </h2>
            <p class="text-slate-400">Dashboard quan tri he thong dang trong qua trinh phat trien...</p>
        </div>
    </main>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats');
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('total-users').textContent = result.stats.totalUsers;
                    document.getElementById('total-analyses').textContent = result.stats.totalAnalyses;
                    document.getElementById('active-users').textContent = result.stats.activeUsers;
                }
            } catch (error) {
                console.error('Loi khi tai thong ke:', error);
            }
        }

        loadStats();
    </script>
</body>
</html>
