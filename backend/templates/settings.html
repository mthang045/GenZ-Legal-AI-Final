<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cai dat - GenZ Legal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-text {
            background: linear-gradient(to right, #06b6d4, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tab-btn.active {
            background: linear-gradient(to right, #0891b2, #2563eb);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white">
    <header class="bg-slate-900/50 backdrop-blur-lg border-b border-slate-700/50 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="/" class="flex items-center gap-4">
                    <i class="fas fa-scale-balanced text-2xl text-cyan-400"></i>
                    <h1 class="text-2xl font-bold gradient-text">GenZ Legal AI</h1>
                </a>
                <button onclick="window.location.href='/'" class="text-slate-400 hover:text-cyan-300">
                    <i class="fas fa-arrow-left mr-2"></i>Quay lai
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="mb-8">
            <h1 class="text-4xl font-bold gradient-text mb-2">Cai dat tai khoan</h1>
            <p class="text-slate-400">Quan ly thong tin ca nhan va tuy chinh tai khoan</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1">
                <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-4 space-y-2">
                    <button onclick="showTab('profile')" class="tab-btn active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-slate-200 transition">
                        <i class="fas fa-user w-5 h-5"></i>
                        <span>Thong tin ca nhan</span>
                    </button>
                    <button onclick="showTab('security')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-slate-200 transition">
                        <i class="fas fa-shield-alt w-5 h-5"></i>
                        <span>Bao mat</span>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="profile-tab" class="tab-content bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-8">
                    <h2 class="text-2xl font-bold mb-6 text-cyan-300"><i class="fas fa-user mr-2"></i>Thong tin ca nhan</h2>
                    <form id="profile-form" onsubmit="saveProfile(event)">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Ho va ten</label>
                                <input type="text" name="fullName" value="Nguyen Van A" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Email</label>
                                <input type="email" name="email" value="user@example.com" readonly class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 opacity-50">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">So dien thoai</label>
                                <input type="tel" name="phone" value="0123456789" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Cong ty</label>
                                <input type="text" name="company" value="Cong ty ABC" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500">
                            </div>
                        </div>
                        <button type="submit" class="mt-6 bg-gradient-to-r from-cyan-500 to-pink-500 px-6 py-3 rounded-full font-semibold hover:shadow-lg transition">
                            <i class="fas fa-save mr-2"></i>Luu thay doi
                        </button>
                    </form>
                </div>

                <div id="security-tab" class="tab-content hidden bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-xl p-8">
                    <h2 class="text-2xl font-bold mb-6 text-cyan-300"><i class="fas fa-shield-alt mr-2"></i>Bao mat</h2>
                    <form id="password-form" onsubmit="changePassword(event)">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Mat khau hien tai</label>
                                <input type="password" name="currentPassword" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Mat khau moi</label>
                                <input type="password" name="newPassword" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Xac nhan mat khau moi</label>
                                <input type="password" name="confirmPassword" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500">
                            </div>
                        </div>
                        <button type="submit" class="mt-6 bg-gradient-to-r from-cyan-500 to-pink-500 px-6 py-3 rounded-full font-semibold hover:shadow-lg transition">
                            <i class="fas fa-lock mr-2"></i>Doi mat khau
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName + '-tab').classList.remove('hidden');
            event.target.closest('.tab-btn').classList.add('active');
        }

        function saveProfile(event) {
            event.preventDefault();
            alert('Da luu thong tin tai khoan!');
        }

        function changePassword(event) {
            event.preventDefault();
            const form = event.target;
            const newPass = form.newPassword.value;
            const confirmPass = form.confirmPassword.value;
            
            if (newPass !== confirmPass) {
                alert('Mat khau moi khong khop!');
                return;
            }
            
            alert('Da thay doi mat khau thanh cong!');
            form.reset();
        }
    </script>
</body>
</html>
