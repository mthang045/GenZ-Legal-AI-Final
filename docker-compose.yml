services:
  # MongoDB Database
  db:
    image: mongo:7.0
    container_name: legal_rag_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=mongodb://db:27017/legal_db
      - MONGODB_URI=mongodb://db:27017/legal_db
      - MONGODB_DB=legal_db
      - MONGODB_HOST=db
      - MONGODB_PORT=27017
    depends_on:
      db:
        condition: service_healthy
    networks:
      - legal-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - legal-network

volumes:
  mongodb_data:

networks:
  legal-network:
    driver: bridge
